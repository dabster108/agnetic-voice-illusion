preprocess_user_input_task:
  description: >
    Process the raw user request below and return ONLY valid JSON.
    Raw input: "{user_input}"

    Required JSON schema:
    {
      "cleaned_input": "string",
      "original_input": "string",
      "language_detected": "string",
      "input_source": "voice|text",
      "noise_removed": ["string"],
      "corrections_made": ["string"],
      "ambiguities_flagged": ["string"],
      "confidence_score": 0.0,
      "is_multi_command": false,
      "segmented_commands": ["string"],
      "intent_summary": "string",
      "primary_goal": "string",
      "domain": "string",
      "required_components": [
        {
          "name": "string",
          "kind": "input|process|storage|output|decision|tool|integration",
          "reason": "string",
          "explicit": true
        }
      ],
      "required_flows": [
        {
          "from": "string",
          "to": "string",
          "action": "string"
        }
      ],
      "step_sequence": ["string"]
    }

    Rules:
    - Preserve intent.
    - Remove filler words and obvious repetition.
    - Fix grammar lightly.
    - If ambiguous, add notes in ambiguities_flagged.
    - ALWAYS elaborate into required_components, even when user input is short.
    - For apps that span client + server (e.g. React + Django/FastAPI), include BOTH sides plus data, auth, and tooling — not only three generic boxes.
    - Include concrete tooling where relevant: e.g. JWT or session middleware, ORM/migrations, env secrets, HTTPS, CORS, password hashing (bcrypt/argon2), optional OAuth/social login, Redis for sessions if scale matters.
    - Use kind "decision" for validation / branching steps (e.g. credentials valid?).
    - Use kind "tool" for third-party libraries, OAuth providers, or dev packages that matter to the architecture.
    - Use kind "storage" for databases, caches, file stores.
    - Aim for at least 6–10 components on full-stack or auth-heavy requests unless the user explicitly wants something tiny.
    - Never force unrelated defaults (no random unrelated microservices).
    - Ensure required_flows and step_sequence describe a clear forward flow.

    Example expansion for "build me a react authentication system with django as backend":
    - required_components should include at least:
      React SPA or React Frontend (kind input),
      HTTPS / Browser (optional input),
      Django REST or Django API layer (kind process),
      Authentication Views or DRF Auth (kind process),
      Credentials Valid? or Session Issued? (kind decision, diamond in diagram),
      User model / Postgres or DB (kind storage),
      JWT or Django Sessions (kind process or tool),
      Tools: djangorestframework-simplejwt or django.contrib.auth (kind tool),
      Optional: Redis session store (kind storage)
    - required_flows should chain UI → API → auth → decision → DB → token/session back.

  expected_output: >
    A single valid JSON object matching the required schema with expanded components and flow hints.

diagram_generation_task:
  description: >
    Using the structured JSON output from the preprocessor task and the schema task, generate a domain-agnostic
    diagram graph AND attach routes + database schema payloads.

    Mandatory stage-by-stage process:
    1) Validate expansion from Agent 1:
      - Use required_components as primary node source (every important component becomes a node).
      - Use required_flows and step_sequence as primary edge source.
      - If expansion is sparse, infer only missing essentials needed to complete the requested flow.
    2) Build stepwise flow graph:
      - One component = one node.
      - One meaningful interaction = one edge.
      - Assign each node a "kind" and "shape" for visualization (see below).
      - For full-stack or authentication diagrams, target at least 6 nodes when the preprocessor listed that many; do not collapse into only 3–4 boxes unless the user asked for minimal.
    3) Finalize output:
      - Deduplicate nodes and edges.
      - Keep titles concise and human-readable.
      - Use multiple shapes: rectangles for services/processes, ellipse for user/client/UI entry, diamond for decisions/validation gates, extra rectangles for tools/libraries.

    Shape and kind rules (must follow on every node):
    - "shape": "ellipse" for user-facing clients, browsers, React/Vue/SPA frontends (kind usually "input").
    - "shape": "diamond" for decisions: validation, authorization checks, branching (kind "decision").
    - "shape": "rectangle" for APIs, backends, services, tools, databases (use kind "storage" for DB/cache, "tool" for libraries/SDKs).

    Rules:
    - Expand intelligently; include tools and storage the user would realistically need.
    - Include backend and persistence when the user names a framework (Django, FastAPI, etc.).
    - Keep labels clean and concise.
    - Avoid duplicate nodes and duplicate edges.
    - Prefer forward flow direction.
    - For authentication requests, show login path, validation decision, session/token issuance, and persistence.

    Return a single valid JSON object directly. Do not call any function/tool unless tools are explicitly provided.

    Output format (strict):
    {
      "nodes": [
        {
          "id": "string",
          "title": "string",
          "kind": "input|process|storage|output|decision|tool|integration",
          "shape": "rectangle|ellipse|diamond"
        }
      ],
      "edges": [
        {
          "id": "string",
          "from": "string",
          "to": "string",
          "label": "string"
        }
      ],
      "routes": [
        {
          "method": "GET|POST|PUT|PATCH|DELETE",
          "path": "/resource",
          "summary": "string"
        }
      ],
      "database_schema": {
        "tables": [
          {
            "name": "string",
            "columns": [
              { "name": "string", "type": "string", "pk": true }
            ]
          }
        ]
      }
    }

    CRITICAL:
    - Every node MUST include "kind" and "shape".
    - Output ONLY valid JSON.
    - No markdown, no explanations, no extra keys.
  expected_output: >
    A valid JSON object containing nodes, edges, routes, and database_schema.

schema_generation_task:
  description: >
    Using the structured JSON output from the preprocessor task, generate a concise REST route list and a
    database schema that support the core entities.

    Rules:
    - Use only the user's required components and flows as inputs.
    - Prefer 2-4 main resources; avoid unnecessary extra tables.
    - Routes should be REST-style; include at least GET list + POST create + GET by id per resource.
    - Schema must include tables and columns; include "id" as primary key and "created_at" timestamp.
    - Output ONLY JSON. No markdown.

    Output format (strict):
    {
      "routes": [
        {
          "method": "GET|POST|PUT|PATCH|DELETE",
          "path": "/resource",
          "summary": "string"
        }
      ],
      "database_schema": {
        "tables": [
          {
            "name": "string",
            "columns": [
              { "name": "string", "type": "string", "pk": true }
            ]
          }
        ]
      }
    }

  expected_output: >
    A valid JSON object containing routes and database_schema.
